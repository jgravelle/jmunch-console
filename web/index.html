<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jMunch Console</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%230d1117'/%3E%3Ccircle cx='16' cy='16' r='7' fill='%234cc2a8'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="tokens.css" />
  <link rel="stylesheet" href="components.css" />
  <link rel="stylesheet" href="polish.css?v=12" />
</head>
<body>
  <div class="app">
    <div class="brand"><span class="dot" id="console-dot" role="button" tabindex="0" title="stop | restart" aria-label="Console power: stop or restart"></span> jMunch&nbsp;Console <small>v0.8.71</small> <small class="beta">BETA</small></div>
    <header class="topbar">
      <span class="meta" id="meta"></span>
      <button class="btn btn--ghost" id="config-gear" title="Configuration" aria-label="Configuration">⚙</button>
      <select class="enum" id="accent-select" title="Accent palette" aria-label="Accent palette">
        <option value="aurora">aurora</option>
        <option value="ember">ember</option>
        <option value="spectrum">spectrum</option>
      </select>
      <button class="btn btn--ghost" id="theme-toggle" title="Toggle theme">◐ theme</button>
    </header>
    <nav class="side" id="nav"></nav>
    <main class="view" id="view"></main>
  </div>
  <script src="app.js?v=12" defer></script>
</body>
</html>
